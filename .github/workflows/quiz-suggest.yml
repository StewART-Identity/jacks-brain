name: Suggest quiz questions

# Triggered manually from /api/quiz/suggest (via the GitHub
# workflow_dispatch REST endpoint) when the user clicks the
# "Generate quiz questions" button on a wiki page.
#
# Workflow shape:
#   1. Checkout with WORKFLOW_GIT_TOKEN (so the push at the end
#      triggers downstream workflows like the Cloudflare Pages
#      build).
#   2. Install Node, dependencies, and the Claude Code CLI.
#   3. Run scripts/suggest-quiz.mjs with the dispatch input slug.
#      The script reads the page, calls claude -p, parses the
#      JSON response, and writes new quiz: frontmatter entries
#      into the page file.
#   4. git add + commit + push if anything changed.
#
# Auth picture (no new secrets — all three already exist for the
# catalog workflow):
#   CLAUDE_CODE_OAUTH_TOKEN — auths claude -p against your Max
#                             plan. Same secret catalog.yml uses.
#   WORKFLOW_GIT_TOKEN      — PAT with contents:read+write. Used
#                             for both the checkout (so it can push)
#                             AND the eventual push commit.
#
# Concurrency:
#   The group is keyed on the slug so multiple suggest calls for the
#   same page serialize. Different pages can run in parallel.
#   cancel-in-progress: false because if the user clicks twice, they
#   probably want BOTH runs to produce questions — quiz pools grow
#   monotonically.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Wiki page slug (e.g. reflect/concepts/sasl)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: quiz-suggest-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT, not GITHUB_TOKEN — same reason catalog.yml needs it.
          # The push at the end of this workflow should trigger the
          # Pages build, which won't happen if GITHUB_TOKEN authored
          # the push.
          token: ${{ secrets.WORKFLOW_GIT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Suggest quiz questions
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_TIMEZONE: ${{ vars.USER_TIMEZONE }}
          SLUG: ${{ inputs.slug }}
        run: |
          set -euo pipefail
          echo "Generating quiz questions for: $SLUG"
          node scripts/suggest-quiz.mjs "$SLUG"

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # The suggest script edits exactly one file under content/.
          # Stage all of content/ defensively in case the script ever
          # grows to touch a sibling page.
          git add content/

          if git diff --staged --quiet; then
            echo "No changes to commit — claude produced no new questions or the script bailed."
            exit 0
          fi

          git commit -m "quiz: suggest questions for ${{ inputs.slug }}"

          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "Failed to push after 4 attempts"
          exit 1
