name: Auto-ingest raw documents

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Path to file in raw/ to ingest (leave blank for all new files)"
        required: false
        type: string
  push:
    branches: [main]
    paths: ["raw/**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run ingest
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "${{ inputs.file_path }}" ]; then
            node scripts/ingest.mjs "${{ inputs.file_path }}"
          else
            node scripts/ingest.mjs
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ingest: auto-generated wiki pages from raw/ documents"
          title: "Ingest: new wiki pages from raw/ documents"
          body: |
            Auto-generated by the ingest workflow.

            This PR contains wiki pages created by Claude from source documents in `raw/`.
            Please review the generated content before merging.
          branch: ingest/auto-${{ github.run_number }}
          delete-branch: true
