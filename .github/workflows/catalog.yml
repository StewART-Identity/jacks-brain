name: Auto-catalog acquired documents

# Three-directory pipeline for cataloging acquisitions:
#
#   static/queue/      — PENDING. Files awaiting their turn.
#   static/in-flight/  — IN_PROGRESS. The file currently being cataloged.
#                        At most one file here at a time.
#   static/originals/  — CATALOGED corpus. Completed files stay here
#                        permanently for download links and listing.
#
# The workflow has two trigger paths plus the manual override:
#
# Path A: push to static/queue/** — a new acquisition landed in staging.
#   If static/in-flight/ is currently empty (no catalog running),
#   promote one file from static/queue/ to static/in-flight/ and exit.
#   The static/in-flight/ push triggers Path B in a new workflow run.
#   If static/in-flight/ is non-empty, do nothing — the running
#   catalog will promote the next file when it finishes.
#
# Path B: push to static/in-flight/** — a file just got promoted.
#   Run the catalog on it. When complete (success or failure), move
#   it from static/in-flight/ to static/originals/, commit any wiki
#   output, then promote the next file from static/queue/ if any.
#
# Path C: workflow_dispatch — manual override for a specific file or
#   the legacy bulk-scan path. Used for operational recovery.
#
# Authentication:
#   We authenticate checkout with WORKFLOW_GIT_TOKEN, a fine-grained PAT
#   with Contents: read/write on this repo. The default GITHUB_TOKEN
#   would work for git operations, BUT GitHub deliberately blocks
#   workflow runs from being triggered by GITHUB_TOKEN-authored pushes
#   (anti-loop guard). Path B above relies on Path A's push to
#   static/in-flight/ triggering a new workflow run — that requires a
#   PAT-authored push, which the GITHUB_TOKEN doesn't provide.
#
# Concurrency:
#   The catalog-main group with cancel-in-progress: false serializes
#   everything. With "false" cancellation, GitHub Actions holds at most
#   one waiter behind a running job; a flood of pushes collapses to
#   "one running, one queued, rest cancelled" — which is fine because
#   the in-flight directory and queue together carry the state across
#   workflow runs.
#
# Planning: directory state, not push payload.
#   The planning step decides what this run should do based on what's
#   currently on disk in static/queue/ and static/in-flight/, NOT based
#   on github.event.commits.*.added/modified. Two reasons:
#     1. The push event payload is unreliable for git mv — sometimes the
#        rename pair shows up under added+removed, sometimes it's
#        coalesced into a rename record and appears in neither.
#     2. The directories ARE the state; the push event is just a trigger
#        to wake us up. Looking at the directories directly is more
#        robust than interpreting the payload.
#   Concurrency-group serialization guarantees no other catalog run is
#   executing while we plan, so we don't need a "is someone else running"
#   check — if static/in-flight/ has a file, that file is OURS to catalog.

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Path to a specific file (relative to repo root) to catalog. Leave blank for the legacy scan-all-uncataloged path (requires CATALOG_ALLOW_BULK)."
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "static/queue/**"
      - "static/in-flight/**"

permissions:
  contents: write

concurrency:
  group: catalog-main
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT, not the implicit GITHUB_TOKEN. See the auth note in the
          # workflow header. Pushes authored via this token's auth WILL
          # trigger downstream workflow runs; pushes via GITHUB_TOKEN will
          # NOT, and we depend on the trigger to chain catalog runs.
          token: ${{ secrets.WORKFLOW_GIT_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install document converters
        run: sudo apt-get update && sudo apt-get install -y pandoc poppler-utils

      # Decide what this run should do based on the CURRENT STATE of the
      # repo directories (not the push event payload). Sets two outputs:
      #   action — "catalog", "promote-only", "dispatch", or "noop"
      #   files_path — newline-separated list of file paths to catalog
      #                (only set when action ∈ {catalog, dispatch})
      - name: Plan this run
        id: plan
        env:
          DISPATCH_PATH: ${{ inputs.file_path }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/catalog
          FILES_OUT=/tmp/catalog/files.txt
          : > "$FILES_OUT"

          # Inventory the directories.
          IN_FLIGHT_FILES=()
          if [ -d static/in-flight ]; then
            while IFS= read -r f; do
              [ -z "$f" ] && continue
              IN_FLIGHT_FILES+=("$f")
            done < <(find static/in-flight -maxdepth 1 -type f \
              ! -name '.gitkeep' | sort)
          fi
          QUEUE_COUNT=0
          if [ -d static/queue ]; then
            QUEUE_COUNT=$(find static/queue -maxdepth 1 -type f \
              ! -name '.gitkeep' | wc -l | tr -d ' ')
          fi
          IN_FLIGHT_COUNT=${#IN_FLIGHT_FILES[@]}
          echo "in-flight count: $IN_FLIGHT_COUNT"
          echo "queue count: $QUEUE_COUNT"

          ACTION=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ACTION="dispatch"
            if [ -n "${DISPATCH_PATH:-}" ]; then
              echo "Manual dispatch with file_path=$DISPATCH_PATH"
              echo "$DISPATCH_PATH" >> "$FILES_OUT"
            else
              echo "Manual dispatch with no file_path — will scan all uncataloged"
            fi
          else
            # Push event. Look at directory state to decide.
            #
            # Decision order:
            #   1. If anything is in static/in-flight/, catalog it. The
            #      file is there because a previous workflow run promoted
            #      it. Concurrency-group serialization guarantees no
            #      other catalog run is currently processing it.
            #   2. Else if anything is in static/queue/, promote one.
            #   3. Else nothing to do.
            if [ "$IN_FLIGHT_COUNT" -gt 0 ]; then
              ACTION="catalog"
              for f in "${IN_FLIGHT_FILES[@]}"; do
                echo "$f" >> "$FILES_OUT"
              done
              echo "Found $IN_FLIGHT_COUNT file(s) in static/in-flight/ — cataloging"
            elif [ "$QUEUE_COUNT" -gt 0 ]; then
              ACTION="promote-only"
              echo "Queue has $QUEUE_COUNT file(s) and in-flight is empty — promoting one"
            else
              ACTION="noop"
              echo "Nothing in queue or in-flight — nothing to do"
            fi
          fi

          echo "Planned action: $ACTION"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          echo "files_path=$FILES_OUT" >> "$GITHUB_OUTPUT"

      # Promote one file from static/queue/ to static/in-flight/.
      # Triggered when action=promote-only (a queue push arrived while
      # nothing was in-flight).
      - name: Promote one from queue (initial trigger)
        if: steps.plan.outputs.action == 'promote-only'
        run: |
          set -euo pipefail
          # Pick the oldest file in static/queue/ — FIFO order. ls -tr is
          # mtime-ascending; for git checkouts mtimes are uniform so we
          # fall back to alphabetical, which is deterministic.
          NEXT=$(ls -tr static/queue/ 2>/dev/null | grep -v '^\.gitkeep$' | head -n 1 || true)
          if [ -z "$NEXT" ]; then
            echo "Queue empty — nothing to promote (race with deletion?)"
            exit 0
          fi
          echo "Promoting to in-flight: $NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p static/in-flight
          git mv "static/queue/$NEXT" "static/in-flight/$NEXT"
          git commit -m "promote from queue: $NEXT"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "Failed to push promotion after 4 attempts"
          exit 1

      - name: Run catalog
        if: steps.plan.outputs.action == 'catalog' || steps.plan.outputs.action == 'dispatch'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_TIMEZONE: ${{ vars.USER_TIMEZONE }}
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
          MCP_SERVER_URL: https://jacks-brain-mcp.stewart-identity.workers.dev/
          FILES_LIST: ${{ steps.plan.outputs.files_path }}
        run: |
          set -euo pipefail
          if [ ! -s "$FILES_LIST" ]; then
            echo "No specific files identified; running catalog.mjs in scan mode"
            CATALOG_ALLOW_BULK=1 node scripts/catalog.mjs
          else
            while IFS= read -r FILE; do
              [ -z "$FILE" ] && continue
              echo "::group::Cataloging $FILE"
              node scripts/catalog.mjs "$FILE"
              echo "::endgroup::"
            done < "$FILES_LIST"
          fi

      # Move the cataloged file from static/in-flight/ to static/originals/,
      # commit the wiki output, and push. This step ALWAYS runs after a
      # catalog (success OR failure) so static/in-flight/ ends up empty
      # either way — a failed catalog should not leave the file stuck
      # in-flight, blocking the queue. The file ends up in
      # static/originals/ without a source page, which the status
      # endpoint correctly classifies as FAILED.
      #
      # The workflow_dispatch case is more flexible: when an operator
      # passes an explicit file_path, that path may already be in
      # static/originals/ (re-cataloging a previously-cataloged file).
      # We only move from in-flight if the file IS in in-flight.
      #
      # Re-view dedupe: if a file in static/in-flight/ has the same name
      # as a file already in static/originals/ — the normal case for a
      # re-view of a previously-cataloged source — `git mv` would refuse
      # to overwrite. Instead, we `git rm` the in-flight duplicate. The
      # bytes are the same (same uploaded file, same name), so the
      # originals copy is the canonical one and the in-flight copy is
      # discarded. The wiki page updates that catalog Claude wrote during
      # the re-view are committed as usual via `git add content/ data/`.
      - name: Finalize and commit
        if: |
          always() &&
          (steps.plan.outputs.action == 'catalog' || steps.plan.outputs.action == 'dispatch')
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Move any file currently in static/in-flight/ to
          # static/originals/. Normally exactly one file; could be zero
          # in dispatch cases where the operator pointed directly at an
          # already-existing originals file.
          mkdir -p static/originals
          MOVED=0
          REMOVED=0
          if [ -d static/in-flight ]; then
            for f in static/in-flight/*; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              if [ "$base" = ".gitkeep" ]; then continue; fi
              if [ -e "static/originals/$base" ]; then
                # Re-view: the file already exists in originals. Drop the
                # in-flight duplicate; the originals copy is canonical.
                # Wiki updates from this re-view are still staged below
                # via `git add content/ data/`.
                echo "Finalizing: $base already in originals (re-view) — removing in-flight duplicate"
                git rm "$f"
                REMOVED=$((REMOVED + 1))
              else
                echo "Finalizing: moving $base out of in-flight"
                git mv "$f" "static/originals/$base"
                MOVED=$((MOVED + 1))
              fi
            done
          fi
          echo "Finalize summary: $MOVED moved to originals, $REMOVED removed (re-view dedupe)"

          # Stage wiki output and the in-flight→originals move(s) together.
          # data/ catches retention writes that bypassed MCP — defense in
          # depth; the normal path is for catalog Claude to commit
          # retention via append_retention_entry MCP tool.
          git add content/ data/ static/in-flight static/originals
          if git diff --staged --quiet; then
            echo "No changes to commit (catalog produced no output and no file to finalize)."
          else
            git commit -m "catalog: process complete, finalize wiki output"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && break
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
          fi

      # Promote the next file from static/queue/ to static/in-flight/, if any.
      # Always runs after a catalog, regardless of success/failure. If
      # the queue is empty, this is a no-op and the cycle ends.
      - name: Promote next from queue (post-catalog)
        if: |
          always() &&
          (steps.plan.outputs.action == 'catalog' || steps.plan.outputs.action == 'dispatch')
        run: |
          set -euo pipefail
          # Re-pull to see commits that landed during the catalog
          # (MCP retention writes, the finalize commit we just pushed,
          # potentially new uploads landing in static/queue/ or deletions
          # from static/queue/).
          git pull --rebase origin main || true
          NEXT=""
          if [ -d static/queue ]; then
            NEXT=$(ls -tr static/queue/ 2>/dev/null | grep -v '^\.gitkeep$' | head -n 1 || true)
          fi
          if [ -z "$NEXT" ]; then
            echo "Queue is empty after catalog — cycle ends"
            exit 0
          fi
          echo "Promoting next from queue: $NEXT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p static/in-flight
          git mv "static/queue/$NEXT" "static/in-flight/$NEXT"
          git commit -m "promote from queue: $NEXT"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying in $((i * 2))s..."
            sleep $((i * 2))
          done
          echo "Failed to push promotion after 4 attempts"
          exit 1
