name: Auto-catalog acquired documents

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Path to acquisition in static/originals/ to catalog (leave blank for all uncataloged)"
        required: false
        type: string
  push:
    branches: [main]
    paths: ["static/originals/**"]

permissions:
  contents: write

concurrency:
  group: catalog-main
  cancel-in-progress: false

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install document converters
        run: sudo apt-get update && sudo apt-get install -y pandoc poppler-utils

      - name: Run catalog
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          USER_TIMEZONE: ${{ vars.USER_TIMEZONE }}
          MCP_SERVICE_TOKEN: ${{ secrets.MCP_SERVICE_TOKEN }}
          MCP_SERVER_URL: https://jacks-brain-mcp.stewart-identity.workers.dev/
        run: |
          if [ -n "${{ inputs.file_path }}" ]; then
            node scripts/catalog.mjs "${{ inputs.file_path }}"
          else
            node scripts/catalog.mjs
          fi

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "catalog: auto-generated wiki pages from acquired documents"
            # Pull any commits that landed while we were processing, then push
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && exit 0
              echo "Push attempt $i failed, retrying in $((i * 2))s..."
              sleep $((i * 2))
            done
            echo "Failed to push after 4 attempts"
            exit 1
          fi
