name: YouTube to wiki

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube video URL to transcribe and catalog"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  youtube-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install yt-dlp and whisper (for fallback)
        run: |
          pip install yt-dlp openai-whisper
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Fetch YouTube transcript
        run: node scripts/youtube-transcript.mjs "${{ inputs.youtube_url }}"

      - name: Determine transcript filename
        id: transcript
        run: |
          # Find the most recently created file in raw/ (excluding .gitkeep)
          FILE=$(ls -t raw/*.md 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No transcript file found in raw/"
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Found transcript: $FILE"

      - name: Run catalog
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: node scripts/catalog.mjs "${{ steps.transcript.outputs.file }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "catalog: wiki pages from YouTube video"
          title: "Catalog: YouTube video — ${{ inputs.youtube_url }}"
          body: |
            Auto-generated by the YouTube catalog workflow.

            **Source:** ${{ inputs.youtube_url }}

            This PR contains:
            - The raw transcript in `raw/`
            - Wiki pages generated by Claude in `content/`

            Please review the generated content before merging.
          branch: catalog/youtube-${{ github.run_number }}
          delete-branch: true
