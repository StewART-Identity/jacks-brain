<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <!-- Soft glow for nuclei and synapses -->
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (transparent so page color shows through) -->
  <rect width="240" height="240" fill="none"/>

  <!-- Axon-like long connections -->
  <g stroke="#4aa58a" stroke-width="1.2" stroke-linecap="round" opacity="0.35">
    <path d="M 10 40 C 80 20, 160 60, 230 30" />
    <path d="M 0 160 C 60 140, 140 200, 240 180" />
    <path d="M 40 240 C 60 180, 120 140, 200 120" />
    <path d="M 20 100 C 80 120, 160 80, 220 110" />
  </g>

  <!-- Dendritic branches (shorter, more branched) -->
  <g stroke="#5fc3a0" stroke-width="1" stroke-linecap="round" opacity="0.4">
    <!-- cluster 1 -->
    <path d="M 60 60 L 80 50" />
    <path d="M 60 60 L 75 70" />
    <path d="M 60 60 L 55 80" />
    <!-- cluster 2 -->
    <path d="M 170 70 L 185 55" />
    <path d="M 170 70 L 190 80" />
    <path d="M 170 70 L 165 90" />
    <!-- cluster 3 -->
    <path d="M 90 170 L 110 160" />
    <path d="M 90 170 L 105 185" />
    <path d="M 90 170 L 80 190" />
  </g>

  <!-- Nuclei (soma) -->
  <g fill="#7fffd4" opacity="0.35" filter="url(#soft-glow)">
    <circle cx="60" cy="60" r="10" />
    <circle cx="170" cy="70" r="11" />
    <circle cx="90" cy="170" r="9" />
    <circle cx="200" cy="150" r="8" />
  </g>

  <!-- Synaptic clefts (tiny paired dots along lines) -->
  <g fill="#b5ffe0" opacity="0.6">
    <!-- along top axon -->
    <circle cx="90" cy="32" r="2" />
    <circle cx="96" cy="34" r="2" />
    <circle cx="150" cy="44" r="2" />
    <circle cx="156" cy="46" r="2" />
    <!-- along middle axon -->
    <circle cx="80" cy="150" r="2" />
    <circle cx="86" cy="152" r="2" />
    <circle cx="150" cy="170" r="2" />
    <circle cx="156" cy="172" r="2" />
    <!-- along lower axon -->
    <circle cx="120" cy="190" r="2" />
    <circle cx="126" cy="192" r="2" />
  </g>

  <!-- Faint grid-ish anchors to help tiling feel continuous -->
  <g fill="#2f5b4a" opacity="0.4">
    <circle cx="0" cy="0" r="1.5" />
    <circle cx="240" cy="0" r="1.5" />
    <circle cx="0" cy="240" r="1.5" />
    <circle cx="240" cy="240" r="1.5" />
  </g>
</svg>
