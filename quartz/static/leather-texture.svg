<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <filter id="veins" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.012 0.015" numOctaves="3" seed="5" stitchTiles="stitch" result="t1"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.035" numOctaves="4" seed="8" stitchTiles="stitch" result="t2"/>
      <feMerge result="combined">
        <feMergeNode in="t1"/>
        <feMergeNode in="t2"/>
      </feMerge>
      <feColorMatrix type="saturate" values="0" result="gray"/>
      <feComponentTransfer result="contrast">
        <feFuncR type="discrete" tableValues="0.1 0.15 0.3 0.5 0.65 0.8 0.9 1"/>
        <feFuncG type="discrete" tableValues="0.1 0.15 0.3 0.5 0.65 0.8 0.9 1"/>
        <feFuncB type="discrete" tableValues="0.1 0.15 0.3 0.5 0.65 0.8 0.9 1"/>
        <feFuncA type="linear" slope="0.09" intercept="0"/>
      </feComponentTransfer>
    </filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" seed="12" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.035"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="400" height="400" filter="url(#veins)"/>
  <rect width="400" height="400" filter="url(#grain)"/>
</svg>
