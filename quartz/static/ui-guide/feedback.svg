ht="400" text-anchor="start" font-style="italic">info · success · warning · error</text><text x="44" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8FCBA3" font-weight="600" text-anchor="start">Status badge / pill</text><rect x="44" y="344" width="61.2" height="24" rx="12" fill="#234B33" stroke="#69B585" stroke-width="1.1"/><text x="74.6" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#69B585" font-weight="700" text-anchor="middle">Active</text><rect x="117.2" y="344" width="68.4" height="24" rx="12" fill="#222F45" stroke="#7B8FAD" stroke-width="1.1"/><text x="151.4" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#7B8FAD" font-weight="700" text-anchor="middle">Pending</text><rect x="197.60000000000002" y="344" width="61.2" height="24" rx="12" fill="#4E2020" stroke="#C46B6B" stroke-width="1.1"/><text x="228.20000000000002" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#C46B6B" font-weight="700" text-anchor="middle">Failed</text>
